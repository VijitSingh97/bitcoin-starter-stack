# Static node settings. Per-box settings (credentials, dbcache) are
# passed on the command line from .env — see docker-compose.yml.

# --- Core ---
daemon=0 # MUST be 0 in Docker so the container doesn't exit

# --- RPC ---
rpcbind=0.0.0.0
rpcallowip=172.16.0.0/12 # Covers all internal Docker IPs

# --- Networking ---
# No inbound connections by default. The outbound routing (Tor-only vs. a fast
# clearnet initial sync) is set on the command line from the entrypoint, since
# it depends on BITCOIN_SYNC_OVER_CLEARNET — see docker-compose.yml.
listen=0
