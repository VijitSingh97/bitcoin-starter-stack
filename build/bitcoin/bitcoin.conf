# --- Core ---
daemon=0 # MUST be 0 in Docker so the container doesn't exit
dbcache=6000

# --- RPC ---
# Credentials are passed on the command line from .env (see docker-compose.yml)
rpcbind=0.0.0.0
rpcallowip=172.16.0.0/12 # Covers all internal Docker IPs

# --- Tor-only networking ---
# All outbound P2P goes through the Tor container; no inbound connections
proxy=172.28.0.25:9050
onlynet=onion
listen=0
