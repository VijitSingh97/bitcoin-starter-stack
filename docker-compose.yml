# Keep unbounded container logs from eating the disk; bitcoind also writes
# its own debug.log in the datadir (rotated by bitcoind itself).
x-logging: &logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  tor:
    build: ./build/tor
    container_name: tor
    environment:
      DASHBOARD_ONION: ${DASHBOARD_ONION:-0}
    volumes:
      - tor_data:/var/lib/tor
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9050"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 5m
    networks:
      btc_net:
        ipv4_address: 172.29.0.25

  bitcoin:
    image: bitcoin/bitcoin:31.1@sha256:da25cedc66b1daefff9f412ee196c901a899c3fa68a33b20849c3e08b5c40d63
    container_name: bitcoin
    user: "1000:1000"
    # tor's group (gid 101 in the tor image) — lets bitcoind read the
    # control-auth cookie for the optional inbound onion service
    group_add:
      - "101"
    environment:
      RPC_USER: ${BITCOIN_RPC_USER:?run ./configure.sh first}
      RPCAUTH_SALT: ${BITCOIN_RPCAUTH_SALT:?run ./configure.sh first}
      RPCAUTH_HASH: ${BITCOIN_RPCAUTH_HASH:?run ./configure.sh first}
      DBCACHE: ${BITCOIN_DBCACHE:-3000}
      PRUNE: ${BITCOIN_PRUNE:-0}
      INBOUND_ONION: ${BITCOIN_INBOUND_ONION:-0}
    volumes:
      - ${BITCOIN_DATA_DIR:-./data/bitcoin}:/data
      - ./build/bitcoin/bitcoin.conf:/data/bitcoin.conf:ro
      - tor_data:/var/lib/tor:ro
    # Clear stale lock files from an unclean shutdown, then start bitcoind.
    # Auth uses rpcauth (salted hash) — the plaintext RPC password never
    # enters this container. Settings come from the environment (configure.sh).
    # The exec line must stay a single line: a YAML line break here becomes a
    # shell line break, silently dropping every flag after it (see tests/test_e2e.sh).
    entrypoint:
      - /bin/sh
      - -c
      - |
        find /data -name '*.lock' -delete
        find /data -name 'LOCK' -delete
        RPCAUTH=$$(printf '%s:%s$$%s' "$$RPC_USER" "$$RPCAUTH_SALT" "$$RPCAUTH_HASH")
        ONION_ARGS=""
        if [ "$$INBOUND_ONION" = "1" ]; then ONION_ARGS="-listen=1 -listenonion=1 -torcontrol=172.29.0.25:9051"; fi
        exec bitcoind -datadir=/data -conf=/data/bitcoin.conf -rpcauth="$$RPCAUTH" -dbcache="$$DBCACHE" -prune="$$PRUNE" $$ONION_ARGS
    stop_signal: SIGTERM
    stop_grace_period: 5m
    restart: unless-stopped
    logging: *logging
    healthcheck:
      # Cookie auth: bitcoin-cli reads /data/.cookie, no credentials needed here
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30m
    networks:
      btc_net:
        ipv4_address: 172.29.0.26

  dashboard:
    build:
      context: .
      dockerfile: build/dashboard/Dockerfile
    container_name: dashboard
    ports:
      # host port 80 -> container's Flask on 8000
      - "80:8000"
    environment:
      RPC_USER: ${BITCOIN_RPC_USER:?run ./configure.sh first}
      RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD:?run ./configure.sh first}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      HEALTHCHECKS_URL: ${HEALTHCHECKS_URL:-}
      ALERT_NEW_BLOCK: ${ALERT_NEW_BLOCK:-0}
      NODE_NAME: ${NODE_NAME:-bitcoin-node}
      STACK_VERSION: ${STACK_VERSION:-dev}
      WATCH_WALLETS_B64: ${WATCH_WALLETS_B64:-}
    volumes:
      - ${BITCOIN_DATA_DIR:-./data/bitcoin}:/data:ro
      # writable state (the saved watch-only wallet list); the chain stays read-only
      - dashboard_state:/state
    restart: unless-stopped
    logging: *logging
    healthcheck:
      # Any HTTP response means alive — 401 is expected when auth is enabled
      test: ["CMD", "python", "-c", "import urllib.request,urllib.error\ntry: urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)\nexcept urllib.error.HTTPError: pass"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 1m
    networks:
      btc_net:
        ipv4_address: 172.29.0.27
    depends_on:
      - bitcoin

networks:
  btc_net:
    driver: bridge
    name: btc_net
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  tor_data:
  dashboard_state:
