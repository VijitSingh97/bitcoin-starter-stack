name: Release

# Tag push -> full test gate -> GitHub Release with tarball + CHANGELOG notes.
# Nothing is published until the gate is green on the tagged commit.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  gate:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(cat VERSION)
          if [ "$tag" != "$version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION ($version)" >&2
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        run: scripts/release-notes.sh "$(cat VERSION)" > /tmp/notes.md

      - name: Build tarball
        run: |
          git archive --format=tar.gz --prefix=bitcoin-starter-stack/ \
            -o bitcoin-starter-stack.tar.gz "$GITHUB_REF_NAME"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" bitcoin-starter-stack.tar.gz \
            --title "$GITHUB_REF_NAME" --notes-file /tmp/notes.md
