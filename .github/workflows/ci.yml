name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck configure.sh tests/*.sh

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Dashboard unit tests
        run: |
          pip install -r build/dashboard/requirements.txt pytest
          python -m pytest build/dashboard/tests -q

      # Runs the configure.sh e2e, the compose contract test, and the
      # full-stack boot test (which builds the images) — same as local.
      - name: Stack tests
        run: tests/run.sh
