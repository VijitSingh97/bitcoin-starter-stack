name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # reused as the release gate (.github/workflows/release.yml)

# Least privilege: the job only reads the repo to test/lint. Image publishing
# lives in release.yml, which declares its own packages: write.
permissions:
  contents: read

# Cancel a superseded run on the same ref (a new push to the same PR/branch).
# Keyed by ref, so a release-gate run on a tag never collides with branch CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ShellCheck
        run: shellcheck configure.sh stack build/tor/entrypoint.sh scripts/*.sh tests/*.sh

      - name: Secret scan (gitleaks)
        run: docker run --rm -v "$PWD":/repo ghcr.io/gitleaks/gitleaks:v8.21.2
          detect --no-git --source=/repo --config=/repo/.gitleaks.toml --redact --verbose

      - name: Lint Dockerfiles (hadolint)
        run: docker run --rm -v "$PWD":/repo -w /repo hadolint/hadolint:v2.12.0
          hadolint build/tor/Dockerfile build/dashboard/Dockerfile

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Dashboard unit tests + coverage
        run: |
          pip install -r build/dashboard/requirements.txt pytest pytest-cov
          cd build/dashboard
          python -m pytest tests -q --cov=. --cov-report=term-missing --cov-fail-under=85

      - name: Frontend unit tests
        run: node --test build/dashboard/static/*.test.mjs

      # configure.sh e2e, compose contract, CLI test, AND the full-stack boot
      # (test_e2e.sh runs here because CI=true — it builds + boots the stack,
      # provisions watch-only wallets, and runs the egress audit).
      - name: Stack tests
        run: tests/run.sh
